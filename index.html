<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churrasco B10 - Gestão Cloud</title>
    <!-- Tailwind CSS para Estilo Rápido e Moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        b10: '#ef4444', // Red 500
                    }
                }
            }
        }
    </script>
    <!-- Supabase JS Client Oficial -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans antialiased">
    
    <!-- Navbar Header -->
    <nav class="bg-red-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-wider uppercase">🥩 Churrasco B10</span>
                </div>
                <div class="flex space-x-4">
                    <button onclick="setMode('garcom')" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium transition-colors">🧑‍🍳 Garçom</button>
                    <button onclick="setMode('cozinha')" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium transition-colors">🔥 Cozinha</button>
                    <button onclick="setMode('dono')" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium transition-colors">📈 Dono</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Alertas -->
    <div id="alert-container" class="fixed top-20 right-4 z-50"></div>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="main-content">
        <!-- Renderizado dinamicamente pelo app.js -->
        <h2 class="text-center text-gray-500 mt-10">Carregando Banco de Dados...</h2>
    </main>

    <!-- Nossa Lógica Principal JS -->
    <script src="app.js"></script>

</body>
</html>
